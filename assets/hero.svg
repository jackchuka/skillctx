<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
  </defs>

  <rect width="960" height="320" fill="url(#bg)" rx="12"/>

  <!-- Blueprint grid -->
  <g stroke="white" stroke-width="0.3" opacity="0.03">
    <line x1="0" y1="40" x2="960" y2="40"/><line x1="0" y1="80" x2="960" y2="80"/>
    <line x1="0" y1="120" x2="960" y2="120"/><line x1="0" y1="160" x2="960" y2="160"/>
    <line x1="0" y1="200" x2="960" y2="200"/><line x1="0" y1="240" x2="960" y2="240"/>
    <line x1="0" y1="280" x2="960" y2="280"/>
    <line x1="80" y1="0" x2="80" y2="320"/><line x1="160" y1="0" x2="160" y2="320"/>
    <line x1="240" y1="0" x2="240" y2="320"/><line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/><line x1="480" y1="0" x2="480" y2="320"/>
    <line x1="560" y1="0" x2="560" y2="320"/><line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="720" y1="0" x2="720" y2="320"/><line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="880" y1="0" x2="880" y2="320"/>
  </g>

  <!-- Corner dimension marks -->
  <path d="M 16 28 L 16 16 L 28 16" stroke="white" stroke-width="1" opacity="0.15" fill="none"/>
  <path d="M 944 28 L 944 16 L 932 16" stroke="white" stroke-width="1" opacity="0.15" fill="none"/>
  <path d="M 16 292 L 16 304 L 28 304" stroke="white" stroke-width="1" opacity="0.15" fill="none"/>
  <path d="M 944 292 L 944 304 L 932 304" stroke="white" stroke-width="1" opacity="0.15" fill="none"/>

  <!-- ═══ CENTER: Config spec box ═══ -->
  <rect x="360" y="72" width="240" height="176" rx="2" fill="none" stroke="white" stroke-width="1" opacity="0.18" stroke-dasharray="6 3"/>
  <rect x="364" y="76" width="232" height="168" rx="1" fill="#18181b" opacity="0.9"/>

  <!-- Box title bar -->
  <rect x="360" y="72" width="240" height="24" rx="2" fill="white" opacity="0.04"/>
  <text x="480" y="88" text-anchor="middle" fill="white" font-family="monospace" font-size="11" font-weight="600" opacity="0.7">$XDG_CONFIG_HOME/config.json</text>

  <!-- VARS section -->
  <text x="380" y="116" fill="white" font-family="monospace" font-size="9" opacity="0.35" letter-spacing="1">VARS</text>
  <line x1="380" y1="120" x2="580" y2="120" stroke="white" stroke-width="0.5" opacity="0.1"/>

  <circle cx="390" cy="136" r="2.5" fill="white" opacity="0.25"/>
  <text x="400" y="140" fill="white" font-family="monospace" font-size="10" opacity="0.65">identity.github</text>
  <text x="500" y="140" fill="white" font-family="monospace" font-size="10" opacity="0.35">= "alice"</text>

  <circle cx="390" cy="156" r="2.5" fill="white" opacity="0.25"/>
  <text x="400" y="160" fill="white" font-family="monospace" font-size="10" opacity="0.65">slack.channel</text>
  <text x="500" y="160" fill="white" font-family="monospace" font-size="10" opacity="0.35">= "C04AB…"</text>

  <circle cx="390" cy="176" r="2.5" fill="white" opacity="0.25"/>
  <text x="400" y="180" fill="white" font-family="monospace" font-size="10" opacity="0.65">paths.notebook</text>
  <text x="500" y="180" fill="white" font-family="monospace" font-size="10" opacity="0.35">= "~/notes"</text>

  <!-- BINDINGS section -->
  <text x="380" y="204" fill="white" font-family="monospace" font-size="9" opacity="0.35" letter-spacing="1">BINDINGS</text>
  <line x1="380" y1="208" x2="580" y2="208" stroke="white" stroke-width="0.5" opacity="0.1"/>
  <text x="400" y="226" fill="white" font-family="monospace" font-size="9" opacity="0.3">skill.key → vars.dotpath</text>

  <!-- ═══ Connection lines (dimension-line style) ═══ -->

  <!-- Left connections -->
  <line x1="360" y1="136" x2="262" y2="72" stroke="white" stroke-width="0.5" opacity="0.14"/>
  <line x1="360" y1="176" x2="262" y2="248" stroke="white" stroke-width="0.5" opacity="0.14"/>
  <!-- Measurement ticks -->
  <line x1="262" y1="68" x2="262" y2="76" stroke="white" stroke-width="0.8" opacity="0.2"/>
  <line x1="262" y1="244" x2="262" y2="252" stroke="white" stroke-width="0.8" opacity="0.2"/>

  <!-- Right connections -->
  <line x1="600" y1="136" x2="698" y2="72" stroke="white" stroke-width="0.5" opacity="0.14"/>
  <line x1="600" y1="176" x2="698" y2="248" stroke="white" stroke-width="0.5" opacity="0.14"/>
  <line x1="698" y1="68" x2="698" y2="76" stroke="white" stroke-width="0.8" opacity="0.2"/>
  <line x1="698" y1="244" x2="698" y2="252" stroke="white" stroke-width="0.8" opacity="0.2"/>

  <!-- Arrow tips -->
  <polygon points="262,72 258,78 266,78" fill="white" opacity="0.18"/>
  <polygon points="262,248 258,242 266,242" fill="white" opacity="0.18"/>
  <polygon points="698,72 694,78 702,78" fill="white" opacity="0.18"/>
  <polygon points="698,248 694,242 702,242" fill="white" opacity="0.18"/>

  <!-- ═══ Skill annotation cards ═══ -->

  <!-- standup-bot (top-left) -->
  <rect x="68" y="48" width="192" height="48" rx="2" fill="none" stroke="white" stroke-width="0.5" opacity="0.15"/>
  <text x="84" y="68" fill="white" font-family="monospace" font-size="11" font-weight="600" opacity="0.65">standup-bot</text>
  <text x="84" y="84" fill="white" font-family="monospace" font-size="9" opacity="0.3">{username} → identity.github</text>

  <!-- blog-writer (bottom-left) -->
  <rect x="68" y="224" width="192" height="48" rx="2" fill="none" stroke="white" stroke-width="0.5" opacity="0.15"/>
  <text x="84" y="244" fill="white" font-family="monospace" font-size="11" font-weight="600" opacity="0.65">blog-writer</text>
  <text x="84" y="260" fill="white" font-family="monospace" font-size="9" opacity="0.3">{path} → paths.notebook</text>

  <!-- deploy-notify (top-right) -->
  <rect x="700" y="48" width="192" height="48" rx="2" fill="none" stroke="white" stroke-width="0.5" opacity="0.15"/>
  <text x="716" y="68" fill="white" font-family="monospace" font-size="11" font-weight="600" opacity="0.65">deploy-notify</text>
  <text x="716" y="84" fill="white" font-family="monospace" font-size="9" opacity="0.3">{channel} → slack.channel</text>

  <!-- code-review (bottom-right) -->
  <rect x="700" y="224" width="192" height="48" rx="2" fill="none" stroke="white" stroke-width="0.5" opacity="0.15"/>
  <text x="716" y="244" fill="white" font-family="monospace" font-size="11" font-weight="600" opacity="0.65">code-review</text>
  <text x="716" y="260" fill="white" font-family="monospace" font-size="9" opacity="0.3">{org} → identity.github</text>

  <!-- Tagline -->
  <text x="480" y="306" text-anchor="middle" fill="white" font-family="monospace" font-size="11" opacity="0.25" letter-spacing="2">ONE CONFIG · EVERY SKILL · ZERO DEPS</text>
</svg>
